<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Crawler</title>
    <style>
        body { background-color: #1a1a1a; color: #00ff00; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { display: grid; grid-template-columns: repeat(20, 20px); grid-template-rows: repeat(20, 20px); gap: 1px; border: 2px solid #333; background-color: #000; }
        .cell { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #controls { margin-top: 20px; display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 10px; }
        button { width: 60px; height: 60px; background-color: #333; color: #00ff00; border: 1px solid #00ff00; font-size: 20px; border-radius: 8px; touch-action: manipulation; }
        #btn-up { grid-area: up; } #btn-left { grid-area: left; } #btn-right { grid-area: right; } #btn-down { grid-area: down; }
        .player { color: #00ffff; text-shadow: 0 0 5px #00ffff; }
    </style>
</head>
<body>
    <h1>Dino Crawler</h1>
    <div id="game-container"></div>
    <div id="controls">
        <button id="btn-up" onclick="move(0, -1)">↑</button>
        <button id="btn-left" onclick="move(-1, 0)">←</button>
        <button id="btn-right" onclick="move(1, 0)">→</button>
        <button id="btn-down" onclick="move(0, 1)">↓</button>
    </div>
    <script>
        const container = document.getElementById('game-container');
        const GRID_SIZE = 20;
        let playerPos = { x: 10, y: 10 };
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playStepSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }
        function drawGrid() {
            container.innerHTML = '';
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (x === playerPos.x && y === playerPos.y) {
                        cell.textContent = '@'; cell.classList.add('player');
                    } else { cell.textContent = '.'; }
                    container.appendChild(cell);
                }
            }
        }
        function move(dx, dy) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const newX = playerPos.x + dx; const newY = playerPos.y + dy;
            if (newX >= 0 && newX < GRID_SIZE && newY >= 0 && newY < GRID_SIZE) {
                playerPos.x = newX; playerPos.y = newY;
                playStepSound(); drawGrid();
            }
        }
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') move(0, -1);
            if (e.key === 'ArrowDown') move(0, 1);
            if (e.key === 'ArrowLeft') move(-1, 0);
            if (e.key === 'ArrowRight') move(1, 0);
        });
        drawGrid();
    </script>
</body>
</html>
