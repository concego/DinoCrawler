<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Crawler</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        #ui-layer {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }

        .screen {
            display: none;
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
            border: 2px solid #00ff00;
            background: #000;
        }

        .active-screen {
            display: block;
        }

        h1 { font-size: 2em; margin-bottom: 20px; color: #ff0000; }
        .menu-btn {
            background: #222;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 15px;
            margin: 10px 0;
            width: 100%;
            cursor: pointer;
            font-size: 1.1em;
            font-family: inherit;
        }
        .menu-btn:hover { background: #004400; }

        #game-container {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 1px;
            background-color: #333;
            border: 4px solid #555;
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 1/1;
        }
        .cell {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            font-weight: bold;
        }
        .player { color: #fff; text-shadow: 0 0 5px #fff; }
        .part { color: #ffcc00; }
        .air { color: #00ffff; }
        .ankylosaur { color: #aa8844; }
        .triceratops { color: #66cc66; }
        .parasaur { color: #ff9966; }
        
        #hud, #controls {
            width: 90vw;
            max-width: 500px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 1.2em;
        }

        #log {
            width: 90vw;
            max-width: 500px;
            height: 120px;
            overflow-y: auto;
            background: #111;
            border: 1px solid #444;
            margin-top: 10px;
            padding: 5px;
            font-size: 0.9em;
            text-align: left;
        }

        #d-pad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 5px;
        }
        #btn-up { grid-area: up; }
        #btn-down { grid-area: down; }
        #btn-left { grid-area: left; }
        #btn-right { grid-area: right; }

        .move-btn {
            padding: 10px;
            font-size: 0.8em;
            background: #333;
            color: #00ff00;
            border: 1px solid #00ff00;
            cursor: pointer;
            min-width: 80px;
        }

        .weapon-btn, .action-btn {
            padding: 15px;
            font-size: 1em;
            background: #333;
            color: #00ff00;
            border: 1px solid #00ff00;
            cursor: pointer;
        }

        .active-weapon { background: #00ff00; color: #000; }

        .lore-text {
            text-align: left;
            font-size: 0.9em;
            line-height: 1.4;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        /* --- Galeria --- */
        .gallery-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
        }
        .tab-btn {
            background: #222;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 8px 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1em;
        }
        .tab-btn.active-tab { background: #00ff00; color: #000; font-weight: bold; }

        .gallery-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-height: 420px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .gallery-card {
            border: 2px solid #00ff00;
            background: #0a0a0a;
            width: 140px;
            padding: 10px 8px;
            text-align: center;
            font-size: 0.78em;
            line-height: 1.4;
        }
        .gallery-card.locked {
            border-color: #333;
            color: #333;
            filter: brightness(0.35);
        }
        .gallery-card .card-art {
            font-size: 0.72em;
            white-space: pre;
            line-height: 1.2;
            margin: 6px 0;
            color: #00cc00;
        }
        .gallery-card.locked .card-art { color: #222; }
        .gallery-card .card-name {
            font-weight: bold;
            font-size: 0.9em;
            color: #ffcc00;
            margin-bottom: 4px;
        }
        .gallery-card.locked .card-name { color: #333; }
        .gallery-card .card-fact {
            font-size: 0.75em;
            color: #aaffaa;
            margin-top: 6px;
            text-align: left;
        }
        .gallery-card .card-badge {
            font-size: 0.7em;
            color: #00ffff;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <!-- Tela de Idioma -->
        <div id="screen-lang" class="screen active-screen">
            <h1>DINO CRAWLER</h1>
            <button class="menu-btn" onclick="setLang('pt')">Português (Brasil)</button>
            <button class="menu-btn" onclick="setLang('en')">English</button>
        </div>

        <!-- Menu Principal -->
        <div id="screen-menu" class="screen">
            <h1 id="menu-title">DINO CRAWLER</h1>
            <button class="menu-btn" onclick="startGame();" id="btn-start">Iniciar Jogo</button>
            <button class="menu-btn" onclick="showScreen('screen-how-to')" id="btn-how-to">Como Jogar</button>
            <button class="menu-btn" onclick="showScreen('screen-lore')" id="btn-lore">Lore (História)</button>
            <button class="menu-btn" onclick="openGallery()" id="btn-gallery">Galeria</button>
            <button class="menu-btn" onclick="showScreen('screen-credits')" id="btn-credits">Créditos</button>
            <button class="menu-btn" onclick="showScreen('screen-lang')" id="btn-back-lang">Mudar Idioma</button>
        </div>

        <!-- Tela de Como Jogar -->
        <div id="screen-how-to" class="screen">
            <h1 id="how-to-title">Como Jogar</h1>
            <div id="how-to-content" class="lore-text"></div>
            <button class="menu-btn" onclick="showScreen('screen-menu')" id="btn-how-to-back">Voltar</button>
        </div>

        <!-- Tela de Lore -->
        <div id="screen-lore" class="screen">
            <h1 id="lore-title">A Lore</h1>
            <div id="lore-content" class="lore-text"></div>
            <button class="menu-btn" onclick="showScreen('screen-menu')" id="btn-lore-back">Voltar</button>
        </div>

        <!-- Tela de Créditos -->
        <div id="screen-credits" class="screen">
            <h1 id="credits-title">Créditos</h1>
            <div id="credits-content" class="lore-text">
            </div>
            <button class="menu-btn" onclick="showScreen('screen-menu')" id="btn-credits-back">Voltar</button>
        </div>

        <!-- Tela de Galeria -->
        <div id="screen-gallery" class="screen">
            <h1 id="gallery-title">Galeria</h1>
            <div class="gallery-tabs">
                <button class="tab-btn active-tab" id="tab-bestiary" onclick="switchTab('bestiary')">Bestiário</button>
                <button class="tab-btn" id="tab-achievements" onclick="switchTab('achievements')">Conquistas</button>
            </div>
            <div id="gallery-bestiary" class="gallery-grid"></div>
            <div id="gallery-achievements" class="gallery-grid" style="display:none;"></div>
            <button class="menu-btn" onclick="showScreen('screen-menu')" id="btn-gallery-back">Voltar</button>
        </div>

        <!-- Tela de Jogo -->
        <div id="screen-game" class="screen" style="border:none; width:100%; max-width: none;">
            <h2>Status</h2>
            <div id="hud">
                <span>HP: <span id="hp">100</span></span>
                <span>O2: <span id="o2">50</span></span>
                <span>📦: <span id="parts">0</span>/5</span>
                <span>💣: <span id="ammo">5</span></span>
            </div>

            <h2>Mapa</h2>
            <div id="game-container" aria-hidden="true"></div>
            <div style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;"><span id="sr-a" aria-live="assertive" aria-atomic="true"></span><span id="sr-b" aria-live="assertive" aria-atomic="true"></span></div>

            <h2>Controles</h2>
            <div id="controls">
                <div id="d-pad">
                    <button id="btn-up" class="move-btn" onclick="aimMode?fireDirectional(0,-1):move(0,-1)">NORTE (↑)</button>
                    <button id="btn-left" class="move-btn" onclick="aimMode?fireDirectional(-1,0):move(-1,0)">OESTE (←)</button>
                    <button id="btn-right" class="move-btn" onclick="aimMode?fireDirectional(1,0):move(1,0)">LESTE (→)</button>
                    <button id="btn-down" class="move-btn" onclick="aimMode?fireDirectional(0,1):move(0,1)">SUL (↓)</button>
                </div>
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <button id="btn-scan" class="action-btn" onclick="scan()">SCAN</button>
                    <button id="btn-fire" class="action-btn" onclick="aimMode?fireDirectional(0,0):enterAimMode()" style="background:#ff0000; color:#fff;">FIRE (F)</button>
                </div>
            </div>

            <h2>Armas</h2>
            <div id="weapon-selector">
                <button id="w-1" class="weapon-btn active-weapon" onclick="setWeapon(0)">1. MACHETE</button>
                <button id="w-2" class="weapon-btn" onclick="setWeapon(1)">2. TASER</button>
                <button id="w-3" class="weapon-btn" onclick="setWeapon(2)">3. GRANADA</button>
                <button id="w-4" class="weapon-btn" onclick="setWeapon(3)">4. LASER ⚡ (<span id="laser-ammo">5</span>)</button>
                <button id="w-4" class="weapon-btn" onclick="setWeapon(3)">4. LASER ⚡ (<span id="laser-ammo">5</span>)</button>
            </div>

            <h2>Log</h2>
            <div id="log" aria-hidden="true"></div>
        </div>
    </div>

        function startGame() {
            player = { x: 1, y: 1, hp: 100, o2: 80, parts: 0, weaponIdx: 0, ammo: 8 };
            killCount = { V: 0, T: 0, F: 0, A: 0, '3': 0, W: 0, total: 0 };

        function startAmbient() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (ambientNodes) return; // já tocando

            // Vento suave — ruído branco filtrado
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            const wind = audioCtx.createBufferSource();
            wind.buffer = buffer;
            wind.loop = true;

            const windFilter = audioCtx.createBiquadFilter();
            windFilter.type = 'bandpass';
            windFilter.frequency.value = 400;
            windFilter.Q.value = 0.3;

            const windGain = audioCtx.createGain();
            windGain.gain.value = 0.04;

            wind.connect(windFilter);
            windFilter.connect(windGain);
            windGain.connect(audioCtx.destination);
            wind.start();

            // Eco de vale — oscilador grave pulsante
            const echo = audioCtx.createOscillator();
            echo.type = 'sine';
            echo.frequency.value = 55;

            const echoGain = audioCtx.createGain();
            echoGain.gain.value = 0.0;

            // Pulsa suavemente a cada ~4s simulando ressonância do vale
            const lfo = audioCtx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = 0.25;
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 0.02;
            lfo.connect(lfoGain);
            lfoGain.connect(echoGain.gain);

            echo.connect(echoGain);
            echoGain.connect(audioCtx.destination);
            echo.start();
            lfo.start();

            ambientNodes = { wind, echo, lfo };
        }

        function stopAmbient() {
            if (!ambientNodes) return;
            try { ambientNodes.wind.stop(); } catch(e) {}
            try { ambientNodes.echo.stop(); } catch(e) {}
            try { ambientNodes.lfo.stop(); } catch(e) {}
            ambientNodes = null;
            stopBreathing();
        }


        function playSound(freq, type = 'sine', volume = 0.3, duration = 0.2, pan = 0) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const panner = audioCtx.createStereoPanner();

            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            panner.pan.setValueAtTime(pan, audioCtx.currentTime);

            osc.connect(gain);
            gain.connect(panner);
            panner.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- Feedback sonoro de O2 baixo ---

        function stopBreathing() {
            if(breathingTimeout) { clearTimeout(breathingTimeout); breathingTimeout = null; }
        }

        function playBreathPulse() {
            // Uma inalação curta (sine subindo) + exalação (sine descendo)
            if(!audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(220, t);
            osc.frequency.linearRampToValueAtTime(180, t + 0.25);
            osc.frequency.linearRampToValueAtTime(150, t + 0.55);
            gain.gain.setValueAtTime(0.0, t);
            gain.gain.linearRampToValueAtTime(0.18, t + 0.1);
            gain.gain.linearRampToValueAtTime(0.12, t + 0.3);
            gain.gain.linearRampToValueAtTime(0.0, t + 0.55);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + 0.6);
        }

        function scheduleBreathing() {
            stopBreathing();
            if(player.o2 > 10) return;
            playBreathPulse();
            // Intervalo diminui com o O2: de 2s (o2=10) até 0.9s (o2=1)
            const interval = Math.max(900, 200 * player.o2);
            breathingTimeout = setTimeout(() => {
                if(player.o2 > 0 && player.hp > 0) scheduleBreathing();
            }, interval);
        }

        // Distorção do sonar quando O2 ≤ 20: toca um chirp breve e instável
        function playO2Warning() {
            if(!audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            // Frequência oscila irregularmente — simula o sonar falhando
            osc.frequency.setValueAtTime(880, t);
            osc.frequency.linearRampToValueAtTime(620 + Math.random() * 200, t + 0.12);
            osc.frequency.linearRampToValueAtTime(880, t + 0.22);
            gain.gain.setValueAtTime(0.12, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + 0.25);
        }

        function initMap() {
            map = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill('.'));
            dinos = [];
            corpses = [];
            map[0][0] = 'M';
            for(let i=0; i<5; i++) {
                let rx, ry;
                do { rx = Math.floor(Math.random()*18)+1; ry = Math.floor(Math.random()*18)+1; } while(map[ry][rx] !== '.');
                map[ry][rx] = 'P';
            }
            for(let i=0; i<3; i++) {
                let rx, ry;
                do { rx = Math.floor(Math.random()*18)+1; ry = Math.floor(Math.random()*18)+1; } while(map[ry][rx] !== '.');
                map[ry][rx] = '*';
            }
            for(let i=0; i<15; i++) {
                let rx, ry;
                do { rx = Math.floor(Math.random()*18)+1; ry = Math.floor(Math.random()*18)+1; } while(map[ry][rx] !== '.');
                map[ry][rx] = '#';
            }
            // Spawn inicial: 1V + 1A + 1'3' + 1W
            let rx, ry;
            rx = Math.floor(Math.random()*15)+4; ry = Math.floor(Math.random()*15)+4;
            if(map[ry][rx] === '.') dinos.push({x: rx, y: ry, type: 'V', hp: 30, stunned: 0, eatingTurns: 0});
            do { rx = Math.floor(Math.random()*16)+2; ry = Math.floor(Math.random()*16)+2; } while(map[ry][rx] !== '.');
            dinos.push({x: rx, y: ry, type: 'A', hp: 80, stunned: 0, eatingTurns: 0, slowTick: 0, charged: false});
            do { rx = Math.floor(Math.random()*16)+2; ry = Math.floor(Math.random()*16)+2; } while(map[ry][rx] !== '.');
            dinos.push({x: rx, y: ry, type: '3', hp: 60, stunned: 0, eatingTurns: 0, provoked: false});
            do { rx = Math.floor(Math.random()*16)+2; ry = Math.floor(Math.random()*16)+2; } while(map[ry][rx] !== '.');
            dinos.push({x: rx, y: ry, type: 'W', hp: 25, stunned: 0, eatingTurns: 0});
            laserAmmo = 5; laserCooldown = 0; aimMode = false;
            document.getElementById('laser-ammo').textContent = 5;
            log.innerHTML = '';
            draw();
        }

        function spawnTRex() {
            addToLog(i18n[lang].roarRex);
            playSound(60, 'sawtooth', 1.5, 0.5);
            let corners = [[18, 18], [18, 0], [0, 18]];
            let pick = corners[Math.floor(Math.random() * corners.length)];
            dinos.push({x: pick[0], y: pick[1], type: 'T', hp: 120, eatingTurns: 0});
            rexRoarTimer = 8 + Math.floor(Math.random() * 5); // primeiro rugido em 8~12 turnos
            draw();
        }

        function triggerRexRoar() {
            addToLog(i18n[lang].rexRoar);
            // Rugido grave longo
            playSound(45, 'sawtooth', 1.2, 0.8);
            setTimeout(() => playSound(38, 'sawtooth', 0.8, 0.6), 300);

            // Spawna 2~3 dinos em fuga em bordas aleatórias — pode ser qualquer herbívoro do vale
            const count = 2 + Math.floor(Math.random() * 2);
            for(let i = 0; i < count; i++) {
                // Escolhe uma borda de entrada
                const side = Math.floor(Math.random() * 4);
                let sx, sy, dirX, dirY;
                if(side === 0)      { sx = Math.floor(Math.random() * GRID_SIZE); sy = 0;  dirX = 0;  dirY = 1; }  // norte → sul
                else if(side === 1) { sx = Math.floor(Math.random() * GRID_SIZE); sy = GRID_SIZE-1; dirX = 0; dirY = -1; } // sul → norte
                else if(side === 2) { sx = 0; sy = Math.floor(Math.random() * GRID_SIZE); dirX = 1;  dirY = 0; }  // oeste → leste
                else                { sx = GRID_SIZE-1; sy = Math.floor(Math.random() * GRID_SIZE); dirX = -1; dirY = 0; } // leste → oeste
                const fleeTypes = ['F', 'A', '3', 'W'];
                const ftype = fleeTypes[Math.floor(Math.random() * fleeTypes.length)];
                const fhp = ftype === 'A' ? 80 : ftype === '3' ? 60 : ftype === 'W' ? 25 : 20;
                dinos.push({ x: sx, y: sy, type: ftype, hp: fhp, stunned: 0, eatingTurns: 0, dirX, dirY, fleeing: true, slowTick: 0, provoked: false });
            }

            // T-Rex ataca dinos adjacentes (raiva — ataca tudo)
            const rex = dinos.find(d => d.type === 'T');
            if(rex) {
                const adjacent = dinos.filter(d => d !== rex && Math.abs(d.x - rex.x) + Math.abs(d.y - rex.y) <= 1);
                adjacent.forEach(target => {
                    const dmg = 40;
                    target.hp -= dmg;
                    addToLog(i18n[lang].rexAttackDino.replace('{target}', i18n[lang].names[target.type]));
                    playSound(90, 'sawtooth', 0.5, 0.3);
                    if(target.hp <= 0) {
                        corpses.push({ x: target.x, y: target.y });
                        dinos.splice(dinos.indexOf(target), 1);
                    }
                });
            }

            rexRoarTimer = 8 + Math.floor(Math.random() * 6); // próximo rugido em 8~13 turnos
        }

        function spawnNewDino() {
            let rx = Math.floor(Math.random() * GRID_SIZE);
            let ry = Math.floor(Math.random() * GRID_SIZE);
            const hasTRex = dinos.some(d => d.type === 'T');
            const canSpawnTRex = player.parts >= 5 && !hasTRex;
            
            if(Math.abs(rx - player.x) + Math.abs(ry - player.y) > 10 && map[ry][rx] === '.' && (rx !== player.x || ry !== player.y) && (rx !== 0 || ry !== 0)) {
                if(!dinos.some(d => d.x === rx && d.y === ry) && !corpses.some(c => c.x === rx && c.y === ry)) {
                    // Impede spawn de dinos fantasmas em cima de cadáveres
                    let type = (canSpawnTRex && Math.random() > 0.8) ? 'T' : 'V';
                    if (type === 'T' && (!canSpawnTRex)) type = 'V';
                    dinos.push({x: rx, y: ry, type: type, hp: type === 'T' ? 100 : 30, eatingTurns: 0});
                    addToLog(type === 'T' ? i18n[lang].roarRex : i18n[lang].roarVelo);
                    playSound(type === 'T' ? 55 : 220, 'sawtooth', 0.4, 0.6);
                }
            }
        }

        function draw() {
            container.innerHTML = '';
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (x === player.x && y === player.y) {
                        cell.textContent = '@';
                        cell.classList.add('player');
                    } else {
                        const dino = dinos.find(d => d.x === x && d.y === y);
                        const corpse = corpses.find(c => c.x === x && c.y === y);
                        if (dino) {
                            cell.textContent = dino.type;
                            if (dino.type === 'A') cell.classList.add('ankylosaur');
                            else if (dino.type === '3') cell.classList.add('triceratops');
                            else if (dino.type === 'W') cell.classList.add('parasaur');
                        }
                        else if (corpse) cell.textContent = 'X';
                        else {
                            cell.textContent = map[y][x];
                            if (map[y][x] === 'P') cell.classList.add('part');
                            if (map[y][x] === '*') cell.classList.add('air');
                            if (map[y][x] === 'M') cell.style.color = '#ff00ff'; 
                        }
                    }
                    container.appendChild(cell);
                }
            }
            document.getElementById('hp').textContent = player.hp;
            document.getElementById('o2').textContent = player.o2;
            document.getElementById('parts').textContent = player.parts;
            document.getElementById('ammo').textContent = player.ammo;
        }

        function move(dx, dy) {
            const nx = player.x + dx; const ny = player.y + dy;
            if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
                if(map[ny][nx] === '#') {
                    addToLog(i18n[lang].bushBlock);
                    srSay(lang === 'pt' ? 'Bloqueado: arbusto.' : 'Blocked: bush.');
                    playSound(150, 'square', 0.2);
                    return;
                }
                player.x = nx; player.y = ny;
                player.o2--;
                if(player.ammo < 8) player.ammo++;
                // Recarga do laser: +1 tiro a cada 2 turnos de cooldown
                if(laserCooldown > 0) { laserCooldown--; if(laserCooldown === 0 && laserAmmo < 5) { laserAmmo++; document.getElementById('laser-ammo').textContent = laserAmmo; } }
                let logMsg = `${player.x}, ${player.y}.`;
                let srParts = [];

                if(player.o2 <= 0) { player.hp -= 5; player.o2 = 0; logMsg += " O2!"; playSound(100, 'sawtooth'); }
                // Feedback sonoro progressivo de O2 baixo
                if(player.o2 <= 20 && player.o2 > 10) playO2Warning();
                if(player.o2 <= 10 && player.o2 > 0) scheduleBreathing();

                if(map[player.y][player.x] === 'P') {
                    player.parts++; map[player.y][player.x] = '.'; logMsg += " " + i18n[lang].partFound;
                    srParts.push(lang === 'pt' ? `Peça coletada! ${player.parts} de 5.` : `Part collected! ${player.parts} of 5.`);
                    playSound(1200, 'sine', 0.4); if(player.parts === 5) spawnTRex();
                }
                if(map[player.y][player.x] === 'M') {
                    if(player.parts >= 5) {
                        unlockCard('escape');
                        if(player.o2 <= 10) unlockCard('countdown');
                        addToLog('★ ' + (lang === 'pt' ? 'Card desbloqueado: Dr. Aris — A Fuga!' : 'Card unlocked: Dr. Aris — The Escape!'));
                        if(player.o2 <= 10) addToLog('★ ' + (lang === 'pt' ? 'Card desbloqueado: Countdown!' : 'Card unlocked: Countdown!'));
                        addToLog(i18n[lang].win); playSound(1500, 'triangle', 1.0, 0.4);
                        srSay(lang === 'pt' ? 'Vitória! Máquina ativada.' : 'Victory! Machine activated.');
                        stopAmbient(); setTimeout(() => showScreen('screen-menu'), 4000); return;
                    } else {
                        logMsg += " " + i18n[lang].machineMissing;
                        srParts.push(lang === 'pt' ? `Máquina do tempo. Faltam ${5 - player.parts} peças.` : `Time machine. ${5 - player.parts} parts missing.`);
                        playSound(523.25, 'sine', 0.5, 0.3);
                        if(!unlockedCards.has('stubborn')) {
                            unlockCard('stubborn');
                            addToLog('★ ' + (lang === 'pt' ? 'Card desbloqueado: Teimoso!' : 'Card unlocked: Stubborn!'));
                        }
                    }
                }
                if(map[player.y][player.x] === '*') {
                    player.o2 += 30; map[player.y][player.x] = '.'; logMsg += " " + i18n[lang].o2Found;
                    srParts.push(lang === 'pt' ? 'Oxigênio recarregado.' : 'Oxygen recharged.');
                    playSound(600, 'triangle', 0.5);
                }

                // Alerta de HP/O2 crítico para leitor de tela
                if(player.hp <= 20) srParts.push(lang === 'pt' ? `HP crítico: ${player.hp}.` : `Critical HP: ${player.hp}.`);
                else if(player.o2 <= 10) srParts.push(lang === 'pt' ? `O2 crítico: ${player.o2}.` : `Critical O2: ${player.o2}.`);

                // O que há nas células adjacentes (raio 1) para o leitor de tela
                const adjNames = [];
                const dinoNames = lang === 'pt' ? i18n.pt.names : i18n.en.names;
                for(const [adx, ady] of [[-1,0],[1,0],[0,-1],[0,1]]) {
                    const ax = player.x + adx; const ay = player.y + ady;
                    if(ax < 0 || ax >= GRID_SIZE || ay < 0 || ay >= GRID_SIZE) continue;
                    const adjDino = dinos.find(d => d.x === ax && d.y === ay);
                    if(adjDino) adjNames.push(dinoNames[adjDino.type] || adjDino.type);
                    else if(map[ay][ax] === 'P') adjNames.push(lang === 'pt' ? 'peça' : 'part');
                    else if(map[ay][ax] === 'M') adjNames.push(lang === 'pt' ? 'máquina do tempo' : 'time machine');
                    else if(map[ay][ax] === '*') adjNames.push(lang === 'pt' ? 'O2' : 'O2 canister');
                    else if(map[ay][ax] === '#') adjNames.push(lang === 'pt' ? 'arbusto' : 'bush');
                }
                if(adjNames.length > 0) srParts.push((lang === 'pt' ? 'Adjacente: ' : 'Adjacent: ') + adjNames.join(', ') + '.');

                const dirLabel = (function() {
                    if(dx === 0 && dy === -1) return lang === 'pt' ? 'Norte' : 'North';
                    if(dx === 0 && dy ===  1) return lang === 'pt' ? 'Sul'   : 'South';
                    if(dx === -1 && dy === 0) return lang === 'pt' ? 'Oeste' : 'West';
                    if(dx ===  1 && dy === 0) return lang === 'pt' ? 'Leste' : 'East';
                    return '';
                })();
                srSay([dirLabel].concat(srParts).filter(Boolean).join('. '));

                addToLog(logMsg);
                playEnvironmentSonar();
                moveDinos();
                let spawnChance = 0.02 + (player.parts * 0.008);
                if(dinos.length < 6 && Math.random() < spawnChance) spawnNewDino();
                draw();
            }
        }

        function moveDinos() {
            const px = player.x; const py = player.y;

            // Tick do rugido do T-Rex
            if(dinos.some(d => d.type === 'T')) {
                rexRoarTimer--;
                if(rexRoarTimer <= 0) triggerRexRoar();
            }

            // Remove dinos em fuga que saíram do mapa
            for(let i = dinos.length - 1; i >= 0; i--) {
                const d = dinos[i];
                if(d.fleeing && (d.x < 0 || d.x >= GRID_SIZE || d.y < 0 || d.y >= GRID_SIZE)) {
                    dinos.splice(i, 1);
                }
            }

            dinos.forEach(d => {
                if(d.stunned > 0) { d.stunned--; return; }

                // Dino em fuga (qualquer tipo): corre em linha reta
                if(d.fleeing) {
                    d.x += d.dirX; d.y += d.dirY;
                    if(d.x === px && d.y === py) {
                        const dmg = d.type === 'A' ? 20 : d.type === '3' ? 15 : 8;
                        player.hp -= dmg;
                        addToLog(i18n[lang].stampede.replace('{dmg}', dmg)); srSay(i18n[lang].stampede.replace('{dmg}', dmg) + ' HP: ' + player.hp + '.');
                        playSound(200, 'sawtooth', 0.5, 0.3);
                        if(player.hp <= 0) { stopAmbient(); stopBreathing(); addToLog(i18n[lang].gameOver); setTimeout(() => showScreen('screen-menu'), 3000); }
                    }
                    return;
                }

                // --- Anquilossauro ---
                if(d.type === 'A') {
                    d.slowTick = (d.slowTick || 0) + 1;
                    if(d.slowTick % 2 !== 0) return; // move 1 a cada 2 turnos
                    const distA = Math.abs(px - d.x) + Math.abs(py - d.y);
                    if(distA <= 1) {
                        // Ataque de cauda: empurra o jogador 2 células
                        const pushDx = Math.sign(px - d.x); const pushDy = Math.sign(py - d.y);
                        player.x = Math.max(0, Math.min(GRID_SIZE-1, px + pushDx * 1));
                        player.y = Math.max(0, Math.min(GRID_SIZE-1, py + pushDy * 1));
                        player.hp -= 10;
                        addToLog(i18n[lang].ankyloBounce); srSay(i18n[lang].ankyloBounce + ' HP: ' + player.hp + '.');
                        playSound(80, 'sawtooth', 0.5, 0.4);
                        if(player.hp <= 0) { stopAmbient(); stopBreathing(); addToLog(i18n[lang].gameOver); setTimeout(() => showScreen('screen-menu'), 3000); }
                    } else if(distA <= 6) {
                        let adx = px - d.x; let ady = py - d.y;
                        if(Math.abs(adx) > Math.abs(ady)) d.x += adx > 0 ? 1 : -1; else d.y += ady > 0 ? 1 : -1;
                    }
                    d.x = Math.max(0, Math.min(GRID_SIZE-1, d.x)); d.y = Math.max(0, Math.min(GRID_SIZE-1, d.y));
                    return;
                }

                // --- Triceratops ---
                if(d.type === '3') {
                    if(d.provoked) {
                        // Carrega direto em linha reta até o jogador
                        const distT = Math.abs(px - d.x) + Math.abs(py - d.y);
                        if(distT <= 1) {
                            player.hp -= 20;
                            addToLog(i18n[lang].triCharge); srSay(i18n[lang].triCharge + ' HP: ' + player.hp + '.');
                            playSound(100, 'sawtooth', 0.6, 0.4);
                            d.provoked = false;
                            if(player.hp <= 0) { stopAmbient(); stopBreathing(); addToLog(i18n[lang].gameOver); setTimeout(() => showScreen('screen-menu'), 3000); }
                        } else {
                            // Move 2 células em direção ao player
                            for(let m = 0; m < 2; m++) {
                                let tdx = px - d.x; let tdy = py - d.y;
                                if(Math.abs(tdx) > Math.abs(tdy)) d.x += tdx > 0 ? 1 : -1; else d.y += tdy > 0 ? 1 : -1;
                                d.x = Math.max(0, Math.min(GRID_SIZE-1, d.x)); d.y = Math.max(0, Math.min(GRID_SIZE-1, d.y));
                            }
                        }
                    }
                    // Neutro: fica parado
                    return;
                }

                // --- Parasaurolofo ---
                if(d.type === 'W') {
                    const distW = Math.abs(px - d.x) + Math.abs(py - d.y);
                    if(distW <= 4) {
                        // Vocaliza e alerta dinos no raio 6
                        addToLog(i18n[lang].paraVocal); srSay(i18n[lang].paraVocal);
                        playSound(440, 'sine', 0.4, 0.6);
                        dinos.forEach(other => {
                            if(other !== d && other.type !== 'W' && other.type !== 'T') {
                                const od = Math.abs(other.x - d.x) + Math.abs(other.y - d.y);
                                if(od <= 6) other.chaseOverride = true;
                            }
                        });
                        // Foge do jogador
                        let wdx = d.x - px; let wdy = d.y - py;
                        if(Math.abs(wdx) > Math.abs(wdy)) d.x += wdx > 0 ? 1 : -1; else d.y += wdy > 0 ? 1 : -1;
                        d.x = Math.max(0, Math.min(GRID_SIZE-1, d.x)); d.y = Math.max(0, Math.min(GRID_SIZE-1, d.y));
                    }
                    return;
                }

                if(d.eatingTurns > 0) {
                    d.eatingTurns--;
                    if(d.eatingTurns === 0) {
                        const eaten = corpses.findIndex(c => c.x === d.x && c.y === d.y);
                        if(eaten !== -1) corpses.splice(eaten, 1);
                    }
                    return;
                }

                // T-Rex ataca dinos adjacentes (V ou F) antes de perseguir player
                if(d.type === 'T') {
                    const prey = dinos.find(other => other !== d && Math.abs(other.x - d.x) + Math.abs(other.y - d.y) <= 1);
                    if(prey) {
                        const dmg = 40; prey.hp -= dmg;
                        addToLog(i18n[lang].rexAttackDino.replace('{target}', i18n[lang].names[prey.type]));
                        playSound(90, 'sawtooth', 0.5, 0.3);
                        if(prey.hp <= 0) { corpses.push({ x: prey.x, y: prey.y }); dinos.splice(dinos.indexOf(prey), 1); }
                        return;
                    }
                }

                let corpseIdx = corpses.findIndex(c => Math.abs(c.x - d.x) <= 1 && Math.abs(c.y - d.y) <= 1);
                if(corpseIdx !== -1) {
                    d.eatingTurns = d.type === 'T' ? 3 : 5; const corpse = corpses[corpseIdx]; d.x = corpse.x; d.y = corpse.y;
                    addToLog(`${i18n[lang].names[d.type]} ${i18n[lang].eating}`);
                    playSound(100, 'square', 0.8, 0.3); return;
                }
                let dx = px - d.x; let dy = py - d.y; let dist = Math.abs(dx) + Math.abs(dy);
                let chaseDist = d.type === 'T' ? 25 : 10;
                if(d.chaseOverride) { chaseDist = 25; d.chaseOverride = false; }
                if(dist <= chaseDist && dist > 0) {
                    const distBefore = dist;
                    let moves = d.type === 'T' ? 2 : 1;
                    for(let m=0; m < moves; m++) {
                        let curDx = px - d.x; let curDy = py - d.y;
                        if(Math.abs(curDx) > Math.abs(curDy)) d.x += curDx > 0 ? 1 : -1; else d.y += curDy > 0 ? 1 : -1;
                        if(d.x === px && d.y === py) {
                            let dmg = d.type === 'T' ? 25 : 8; player.hp -= dmg;
                            addToLog(`${i18n[lang].attack} ${i18n[lang].names[d.type]}! -${dmg} HP.`);
                            playSound(80, 'sawtooth', 0.5, 0.4); break;
                        }
                    }
                    // Alerta sonoro: toca quando o dino avança na direção do player
                    const distAfter = Math.abs(px - d.x) + Math.abs(py - d.y);
                    if(distAfter < distBefore && distAfter > 0) {
                        const pan = Math.max(-1, Math.min(1, (d.x - px) / 5));
                        if(d.type === 'T') {
                            // T-Rex: pulso grave audível a qualquer distância
                            playSound(55, 'sawtooth', Math.max(0.08, 0.35 - distAfter * 0.01), 0.08, pan);
                        } else if(distAfter <= 5) {
                            // Velo: clique seco só quando perto (≤5) pra não saturar
                            playSound(180, 'square', Math.max(0.05, 0.22 - distAfter * 0.03), 0.06, pan);
                        }
                    }
                } else {
                    let r = Math.random();
                    if(r < 0.25) d.x++; else if(r < 0.5) d.x--; else if(r < 0.75) d.y++; else d.y--;
                }
                d.x = Math.max(0, Math.min(GRID_SIZE-1, d.x)); d.y = Math.max(0, Math.min(GRID_SIZE-1, d.y));
            });
            if(player.hp <= 0) {
                addToLog(i18n[lang].gameOver); srSay(i18n[lang].gameOver); playSound(50, 'sawtooth', 2.0, 0.5);
                stopAmbient(); setTimeout(() => showScreen('screen-menu'), 3000);
            }

            // Briga por cadáver: 2 dinos comendo na mesma célula se atacam
            const eating = dinos.filter(d => d.eatingTurns > 0);
            for(let i = 0; i < eating.length; i++) {
                for(let j = i + 1; j < eating.length; j++) {
                    const a = eating[i]; const b = eating[j];
                    if(a.x === b.x && a.y === b.y) {
                        const nameA = i18n[lang].names[a.type]; const nameB = i18n[lang].names[b.type];
                        addToLog(i18n[lang].fighting.replace('{a}', nameA).replace('{b}', nameB));
                        playSound(160, 'sawtooth', 0.6, 0.5);
                        // T-Rex sempre vence; entre iguais é 50/50
                        let winner, loser;
                        if(a.type === 'T' && b.type !== 'T') { winner = a; loser = b; }
                        else if(b.type === 'T' && a.type !== 'T') { winner = b; loser = a; }
                        else { winner = Math.random() < 0.5 ? a : b; loser = winner === a ? b : a; }
                        const nameW = i18n[lang].names[winner.type]; const nameL = i18n[lang].names[loser.type];
                        addToLog(i18n[lang].fightWin.replace('{winner}', nameW).replace('{loser}', nameL));
                        playSound(60, 'sawtooth', 0.8, 0.4);
                        dinos.splice(dinos.indexOf(loser), 1);
                        // Vencedor volta a comer — cadáver já está sendo consumido
                        winner.eatingTurns = winner.type === 'T' ? 3 : 5;
                    }
                }
            }
        }

        function scan() {
            moveDinos();
            let found = [];
            addToLog(`${i18n[lang].scanned} ${player.x}, ${player.y}...`);
            for(let y=0; y<GRID_SIZE; y++) {
                for(let x=0; x<GRID_SIZE; x++) {
                    let cell = map[y][x];
                    const dino = dinos.find(d => d.x === x && d.y === y);
                    const corpse = corpses.find(c => c.x === x && c.y === y);
                    if (dino) cell = dino.type; else if (corpse) cell = 'X';
                    if(cell !== '.') {
                        let dx = x - player.x; let dy = y - player.y; let dist = Math.abs(dx) + Math.abs(dy);
                        if(dist >= 0 && dist < 6) {
                            let dirY = dy > 0 ? (lang === 'pt' ? "S" : "S") : dy < 0 ? (lang === 'pt' ? "N" : "N") : "";
                            let dirX = dx > 0 ? (lang === 'pt' ? "L" : "E") : dx < 0 ? (lang === 'pt' ? "O" : "W") : "";
                            
                            let loc;
                            if (dist === 0) {
                                loc = i18n[lang].here;
                            } else {
                                let parts = [];
                                if (dy !== 0) parts.push(`${Math.abs(dy)}${dirY}`);
                                if (dx !== 0) parts.push(`${Math.abs(dx)}${dirX}`);
                                loc = parts.join(", ");
                            }
                            
                            const names = i18n[lang].names;
                            found.push(`${names[cell] || cell}: ${loc}`);
                        }
                    }
                }
            }
            if (found.length) {
                found.forEach(msg => addToLog(msg));
                srSay(found.join('. '));
            } else {
                addToLog(i18n[lang].nothingNear);
                srSay(i18n[lang].nothingNear);
            }
            playSound(600, 'sine'); draw();
        }

        function setWeapon(idx) {
            player.weaponIdx = idx;
            document.querySelectorAll('.weapon-btn').forEach((b, i) => {
                b.classList.toggle('active-weapon', i === idx);
            });
            playSound(400, 'sine', 0.2);
            setTimeout(() => srSay(lang === 'pt' ? `Arma: ${weapons[idx]}.` : `Weapon: ${weapons[idx]}.`), 120);
            moveDinos();
        }

        function fireDirectional(dx, dy) {
            aimMode = false;
            const weapon = weapons[player.weaponIdx];

            // ── Mesma célula (F+F) ───────────────────────────────────────
            if(dx === 0 && dy === 0) {
                if(weapon === 'Machete') {
                    checkHit(player.x, player.y, 10); playSwordSlash();
                } else if(weapon === 'Taser') {
                    checkHit(player.x, player.y, 15); playTaserZap();
                } else if(weapon === 'Granada') {
                    if(player.ammo <= 0) { addToLog(i18n[lang].noAmmo); srSay(i18n[lang].noAmmo); return; }
                    player.ammo--;
                    // Friendly fire: área 2x2 centrada no player
                    for(let gy=-1;gy<=1;gy++) for(let gx=-1;gx<=1;gx++) checkHit(player.x+gx, player.y+gy, 25);
                    player.hp -= 15;
                    addToLog(lang==='pt'?'GRANADA NA PRÓPRIA POSIÇÃO! -15 HP (friendly fire)':'GRENADE ON SELF! -15 HP (friendly fire)');
                    srSay(lang==='pt'?'Friendly fire! Menos 15 HP.':'Friendly fire! Minus 15 HP.');
                    playSound(150,'sawtooth',0.8,0.6); playSound(80,'sawtooth',0.5,0.8);
                    if(player.hp<=0){player.hp=0;stopAmbient();stopBreathing();addToLog(i18n[lang].gameOver);srSay(i18n[lang].gameOver);setTimeout(()=>showScreen('screen-menu'),3000);return;}
                } else if(weapon === 'Laser') {
                    if(laserAmmo<=0){addToLog(i18n[lang].laserNoAmmo);srSay(i18n[lang].laserNoAmmo);return;}
                    laserAmmo--; laserCooldown=2; document.getElementById('laser-ammo').textContent=laserAmmo;
                    const hit=checkHit(player.x,player.y,50);
                    if(hit){addToLog(i18n[lang].laserFire+' '+i18n[lang].laserHit+'!');srSay(i18n[lang].laserFire+' '+i18n[lang].laserHit+'!');}
                    else{addToLog(i18n[lang].laserMiss);srSay(i18n[lang].laserMiss);}
                    playLaserShot();
                }
                moveDinos(); draw(); return;
            }

            // ── Com direção (F + seta) ───────────────────────────────────
            if(weapon === 'Machete') {
                // Machete: 1 casa na direção
                const nx=player.x+dx, ny=player.y+dy;
                if(nx>=0&&nx<GRID_SIZE&&ny>=0&&ny<GRID_SIZE){
                    const cell=map[ny][nx];
                    const corpseIdx=corpses.findIndex(c=>c.x===nx&&c.y===ny);
                    if(corpseIdx!==-1){corpses.splice(corpseIdx,1);addToLog(lang==='pt'?'Cadáver removido!':'Corpse cleared!');srSay(lang==='pt'?'Cadáver removido!':'Corpse cleared!');playSound(150,'square',0.4,0.4);unlockCard('disturber');}
                    if(cell==='#'){map[ny][nx]='.';addToLog(lang==='pt'?'Arbusto removido!':'Bush cleared!');srSay(lang==='pt'?'Arbusto removido!':'Bush cleared!');playSwordSlash();unlockCard('lumberjack');}
                    checkHit(nx,ny,10);
                }
                playSwordSlash();
            } else if(weapon === 'Taser') {
                // Taser: só mesma célula (F+F); F+seta não tem efeito
                addToLog(lang==='pt'?'Taser: apenas corpo a corpo (F+F).':'Taser: melee only (F+F).');
                srSay(lang==='pt'?'Taser: apenas corpo a corpo.':'Taser: melee only.');
                return;
            } else if(weapon === 'Granada') {
                // Granada: arremessa até 2 casas na direção, área 2x2 no ponto de impacto
                if(player.ammo<=0){addToLog(i18n[lang].noAmmo);srSay(i18n[lang].noAmmo);return;}
                player.ammo--;
                const gx=player.x+dx*2, gy=player.y+dy*2;
                for(let oy=-1;oy<=1;oy++) for(let ox=-1;ox<=1;ox++) checkHit(gx+ox,gy+oy,25);
                addToLog(lang==='pt'?`Granada arremessada!`:`Grenade thrown!`);
                srSay(lang==='pt'?'Granada arremessada!':'Grenade thrown!');
                playSound(150,'sawtooth',0.8,0.6); playSound(80,'sawtooth',0.5,0.8);
            } else if(weapon === 'Laser') {
                // Laser: linha reta até 8 casas, para no 1° dino atingido
                if(laserAmmo<=0){addToLog(i18n[lang].laserNoAmmo);srSay(i18n[lang].laserNoAmmo);return;}
                laserAmmo--; laserCooldown=2; document.getElementById('laser-ammo').textContent=laserAmmo;
                let hit=false;
                for(let step=1;step<=8;step++){
                    const lx=player.x+dx*step, ly=player.y+dy*step;
                    if(lx<0||lx>=GRID_SIZE||ly<0||ly>=GRID_SIZE) break;
                    if(map[ly][lx]==='#') break; // arbusto bloqueia
                    if(checkHit(lx,ly,50)){hit=true;break;}
                }
                const dirName=dx===0?(dy<0?(lang==='pt'?'Norte':'North'):(lang==='pt'?'Sul':'South')):(dx<0?(lang==='pt'?'Oeste':'West'):(lang==='pt'?'Leste':'East'));
                if(hit){addToLog(i18n[lang].laserFire+' '+dirName+'. '+i18n[lang].laserHit+'!');srSay(i18n[lang].laserFire+' '+dirName+'. '+i18n[lang].laserHit+'!');}
                else{addToLog(i18n[lang].laserMiss+' ('+dirName+')');srSay(i18n[lang].laserMiss);}
                playLaserShot();
            }
            moveDinos(); draw();
        }

        function checkHit(x, y, dmg) {
            let hit = false;
            for(let i = dinos.length - 1; i >= 0; i--) {
                const d = dinos[i];
                if(d.x === x && d.y === y) {
                    d.hp -= dmg;
                    const dName = i18n[lang].names[d.type];
                    // Triceratops fica provoked ao levar hit
                    if(d.type === '3' && d.hp > 0) d.provoked = true;
                    if(weapons[player.weaponIdx] === 'Taser') {
                        if(d.type === 'T') unlockCard('gambler');
                        if(d.type === 'A') {
                            // Anquilossauro é imune ao Taser
                            playSound(200, 'square', 0.3, 0.3);
                            addToLog(i18n[lang].ankyloImune);
                            srSay(i18n[lang].ankyloImune);
                        } else {
                            const stunChance = d.type === 'T' ? 0.35 : d.type === '3' ? 0.65 : 0.65;
                            if(Math.random() < stunChance) {
                                d.stunned = 3;
                                playSound(1200, 'sine', 0.2, 0.5);
                                addToLog(lang === 'pt' ? `Stun: ${dName} paralisado!` : `Stun: ${dName} paralyzed!`);
                                srSay(lang === 'pt' ? `Stun: ${dName} paralisado!` : `Stun: ${dName} paralyzed!`);
                                if(!stunDone) { stunDone = true; unlockCard('stun'); addToLog('★ ' + (lang === 'pt' ? 'Card desbloqueado: Choque Certeiro!' : 'Card unlocked: Precise Shock!')); }
                            } else {
                                playSound(400, 'sine', 0.15, 0.3);
                                addToLog(lang === 'pt' ? `Taser: ${dName} resistiu ao choque!` : `Taser: ${dName} resisted the shock!`);
                                srSay(lang === 'pt' ? `Taser: ${dName} resistiu ao choque!` : `Taser: ${dName} resisted the shock!`);
                            }
                        }
                    }
                    if(d.hp <= 0) {
                        addToLog(`Kill: ${dName}!`); srSay(`Kill: ${dName}!`); corpses.push({x: d.x, y: d.y});
                        // Contagem de kills para galeria
                        const dtype = d.type;
                        killCount[dtype] = (killCount[dtype] || 0) + 1;
                        killCount.total++;
                        if(dtype === 'V' && killCount.V === 1) { unlockCard('velociraptor'); addToLog('★ ' + (lang === 'pt' ? 'Card desbloqueado: Velociraptor!' : 'Card unlocked: Velociraptor!')); }
                        if(dtype === 'T') { unlockCard('trex'); addToLog('★ ' + (lang === 'pt' ? 'Card desbloqueado: Tiranossauro Rex!' : 'Card unlocked: Tyrannosaurus Rex!')); }
                        if((dtype === 'F' || dtype === 'A' || dtype === '3' || dtype === 'W') && killCount[dtype] === 1) {
                            if(dtype === 'F') { unlockCard('herd'); addToLog('★ ' + (lang === 'pt' ? 'Card desbloqueado: Dino de Manada!' : 'Card unlocked: Herd Dinosaur!')); }
                            if(dtype === 'A') { unlockCard('ankylosaur'); addToLog('★ ' + (lang === 'pt' ? 'Card desbloqueado: Anquilossauro!' : 'Card unlocked: Ankylosaurus!')); }
                            if(dtype === '3') { unlockCard('triceratops'); addToLog('★ ' + (lang === 'pt' ? 'Card desbloqueado: Triceratops!' : 'Card unlocked: Triceratops!')); }
                            if(dtype === 'W') { unlockCard('parasaur'); addToLog('★ ' + (lang === 'pt' ? 'Card desbloqueado: Parasaurolofo!' : 'Card unlocked: Parasaurolophus!')); }
                        }
                        if(killCount.V >= 5) { unlockCard('exterminator'); }
                        if(killCount.total >= 10) { unlockCard('apex'); }
                        dinos.splice(i, 1);
                    } else {
                        addToLog(`Hit: ${dName}! (HP: ${d.hp})`);
                        srSay(lang === 'pt' ? `Acerto: ${dName}! HP restante: ${d.hp}.` : `Hit: ${dName}! Remaining HP: ${d.hp}.`);
                        if(!(weapons[player.weaponIdx] === 'Taser')) {
                            let rdx = player.x - d.x; let rdy = player.y - d.y;
                            if(Math.abs(rdx) > Math.abs(rdy)) d.x += rdx > 0 ? 1 : -1; else d.y += rdy > 0 ? 1 : -1;
                        }
                        playSound(120, 'sawtooth', 0.2, 0.3);
                        // Contra-ataque imediato se não estiver stunned e não for Taser
                        if(weapons[player.weaponIdx] !== 'Taser' && d.stunned <= 0) {
                            const counterDmg = d.type === 'T' ? 25 : 5;
                            player.hp -= counterDmg;
                            addToLog(lang === 'pt' ? `${dName} contra-ataca! -${counterDmg} HP` : `${dName} counter-attacks! -${counterDmg} HP`); srSay(lang === 'pt' ? `${dName} contra-ataca! HP: ${player.hp}.` : `${dName} counter-attacks! HP: ${player.hp}.`);
                            playSound(220, 'sawtooth', 0.4, 0.2);
                            if(player.hp <= 0) { player.hp = 0; stopAmbient(); stopBreathing(); addToLog(i18n[lang].gameOver); srSay(i18n[lang].gameOver); setTimeout(() => showScreen('screen-menu'), 3000); }
                        }
                    }
                    hit = true;
                }
            }
            return hit;
        }

        function playSwordSlash() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Impacto seco: ruído branco filtrado com envelope agressivo
            const bufSize = audioCtx.sampleRate * 0.18;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for(let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

            const src = audioCtx.createBufferSource();
            src.buffer = buf;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 1800;
            filter.Q.value = 1.5;

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.7, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);

            src.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            src.start();
            src.stop(audioCtx.currentTime + 0.18);
        }

        function playTaserZap() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Sweep elétrico: frequência desce rapidamente com harmônico
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            osc.type = 'square';
            osc.frequency.setValueAtTime(2400, t);
            osc.frequency.exponentialRampToValueAtTime(180, t + 0.18);

            const osc2 = audioCtx.createOscillator();
            osc2.type = 'sawtooth';
            osc2.frequency.setValueAtTime(3600, t);
            osc2.frequency.exponentialRampToValueAtTime(260, t + 0.15);

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.25, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.22);

            const gain2 = audioCtx.createGain();
            gain2.gain.setValueAtTime(0.15, t);
            gain2.gain.exponentialRampToValueAtTime(0.01, t + 0.18);

            osc.connect(gain);   gain.connect(audioCtx.destination);
            osc2.connect(gain2); gain2.connect(audioCtx.destination);

            osc.start(t);  osc.stop(t + 0.22);
            osc2.start(t); osc2.stop(t + 0.22);
        }

        function playEnvironmentSonar() {
            // Som de passo
            playSound(80, 'sine', 0.12, 0.08);

            const sonarItems = [];

            // Varre raio 3 ao redor do jogador
            for (let dy = -3; dy <= 3; dy++) {
                for (let dx = -3; dx <= 3; dx++) {
                    if (dx === 0 && dy === 0) continue;
                    const nx = player.x + dx; const ny = player.y + dy;
                    if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) continue;
                    const dist = Math.abs(dx) + Math.abs(dy);
                    let cell = map[ny][nx];
                    const dino = dinos.find(d => d.x === nx && d.y === ny);
                    const corpse = corpses.find(c => c.x === nx && c.y === ny);
                    if (dino) cell = dino.type; else if (corpse) cell = 'X';

                    let freq = 0; let type = 'sine'; let maxDist = 1;
                    if (cell === 'P')         { freq = 880;    type = 'triangle'; maxDist = 1; }
                    else if (cell === '*')    { freq = 600;    type = 'triangle'; maxDist = 1; }
                    else if (cell === '#')    { freq = 150;    type = 'square';   maxDist = 1; }
                    else if (cell === 'M')    { freq = 523.25; type = 'sine';     maxDist = 2; }
                    else if (cell === 'X')    { freq = 200;    type = 'square';   maxDist = 2; }
                    else if (cell === 'V')    { freq = 180;    type = 'sawtooth'; maxDist = 3; }
                    else if (cell === 'T')    { freq = 80;     type = 'sawtooth'; maxDist = 3; }

                    if (freq > 0 && dist <= maxDist) {
                        const vol = 0.25 - (dist - 1) * 0.07;
                        const pan = dx / 3;
                        sonarItems.push({ freq, type, vol: Math.max(vol, 0.04), pan });
                    }
                }
            }

            // Toca cada item com delay para não sobrepor tudo
            sonarItems.forEach((item, i) => {
                setTimeout(() => playSound(item.freq, item.type, item.vol, 0.15, item.pan), i * 120);
            });
        }

        function enterAimMode() {
            aimMode = true;
            srSay(i18n[lang].aimMode);
            addToLog(i18n[lang].aimMode);
        }

        function playLaserShot() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1800, t);
            osc.frequency.exponentialRampToValueAtTime(400, t + 0.25);
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.4, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + 0.3);
        }

        function srSay(msg) {
            const current = srSlots[srIdx];
            const other = srSlots[1 - srIdx];
            other.textContent = '';
            current.textContent = msg;
            srIdx = 1 - srIdx;
        }

        function addToLog(msg) {
            const entry = document.createElement('div');
            entry.textContent = `> ${msg}`;
            log.insertBefore(entry, log.firstChild);
            if (log.childNodes.length > 50) log.removeChild(log.lastChild);
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('screen-game').classList.contains('active-screen')) {
                if (aimMode) {
                    e.preventDefault();
                    if (e.key === 'f' || e.key === 'F') { fireDirectional(0, 0); return; }
                    if (e.key === 'ArrowUp')    { fireDirectional(0, -1); return; }
                    if (e.key === 'ArrowDown')  { fireDirectional(0,  1); return; }
                    if (e.key === 'ArrowLeft')  { fireDirectional(-1, 0); return; }
                    if (e.key === 'ArrowRight') { fireDirectional( 1, 0); return; }
                    if (e.key === 'Escape') { aimMode = false; srSay(i18n[lang].aimCancel); return; }
                    return;
                }
                if (e.key === 'ArrowUp') move(0, -1);
                if (e.key === 'ArrowDown') move(0, 1);
                if (e.key === 'ArrowLeft') move(-1, 0);
                if (e.key === 'ArrowRight') move(1, 0);
                if (e.key === 's') scan();
                if (e.key === 'f') { aimMode = true; srSay(i18n[lang].aimMode); }
                if (['1','2','3','4'].includes(e.key)) setWeapon(parseInt(e.key)-1);
            }
        });
    </script>
