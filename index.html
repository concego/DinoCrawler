<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Crawler</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        #ui-layer {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }

        .screen {
            display: none;
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
            border: 2px solid #00ff00;
            background: #000;
        }

        .active-screen {
            display: block;
        }

        h1 { font-size: 2em; margin-bottom: 20px; color: #ff0000; }
        .menu-btn {
            background: #222;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 15px;
            margin: 10px 0;
            width: 100%;
            cursor: pointer;
            font-size: 1.1em;
            font-family: inherit;
        }
        .menu-btn:hover { background: #004400; }

        #game-container {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 1px;
            background-color: #333;
            border: 4px solid #555;
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 1/1;
        }
        .cell {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            font-weight: bold;
        }
        .player { color: #fff; text-shadow: 0 0 5px #fff; }
        .part { color: #ffcc00; }
        .air { color: #00ffff; }
        
        #hud, #controls {
            width: 90vw;
            max-width: 500px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 1.2em;
        }

        #log {
            width: 90vw;
            max-width: 500px;
            height: 120px;
            overflow-y: auto;
            background: #111;
            border: 1px solid #444;
            margin-top: 10px;
            padding: 5px;
            font-size: 0.9em;
            text-align: left;
        }

        #d-pad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 5px;
        }
        #btn-up { grid-area: up; }
        #btn-down { grid-area: down; }
        #btn-left { grid-area: left; }
        #btn-right { grid-area: right; }

        .move-btn {
            padding: 10px;
            font-size: 0.8em;
            background: #333;
            color: #00ff00;
            border: 1px solid #00ff00;
            cursor: pointer;
            min-width: 80px;
        }

        .weapon-btn, .action-btn {
            padding: 15px;
            font-size: 1em;
            background: #333;
            color: #00ff00;
            border: 1px solid #00ff00;
            cursor: pointer;
        }

        .active-weapon { background: #00ff00; color: #000; }

        .lore-text {
            text-align: left;
            font-size: 0.9em;
            line-height: 1.4;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <!-- Tela de Idioma -->
        <div id="screen-lang" class="screen active-screen">
            <h1>DINO CRAWLER</h1>
            <button class="menu-btn" onclick="setLang('pt')">Português (Brasil)</button>
            <button class="menu-btn" onclick="setLang('en')">English</button>
        </div>

        <!-- Menu Principal -->
        <div id="screen-menu" class="screen">
            <h1 id="menu-title">DINO CRAWLER</h1>
            <button class="menu-btn" onclick="startGame();" id="btn-start">Iniciar Jogo</button>
            <button class="menu-btn" onclick="showScreen('screen-how-to')" id="btn-how-to">Como Jogar</button>
            <button class="menu-btn" onclick="showScreen('screen-lore')" id="btn-lore">Lore (História)</button>
            <button class="menu-btn" onclick="showScreen('screen-credits')" id="btn-credits">Créditos</button>
            <button class="menu-btn" onclick="showScreen('screen-lang')" id="btn-back-lang">Mudar Idioma</button>
        </div>

        <!-- Tela de Como Jogar -->
        <div id="screen-how-to" class="screen">
            <h1 id="how-to-title">Como Jogar</h1>
            <div id="how-to-content" class="lore-text"></div>
            <button class="menu-btn" onclick="showScreen('screen-menu')" id="btn-how-to-back">Voltar</button>
        </div>

        <!-- Tela de Lore -->
        <div id="screen-lore" class="screen">
            <h1 id="lore-title">A Lore</h1>
            <div id="lore-content" class="lore-text"></div>
            <button class="menu-btn" onclick="showScreen('screen-menu')" id="btn-lore-back">Voltar</button>
        </div>

        <!-- Tela de Créditos -->
        <div id="screen-credits" class="screen">
            <h1 id="credits-title">Créditos</h1>
            <div id="credits-content" class="lore-text">
            </div>
            <button class="menu-btn" onclick="showScreen('screen-menu')" id="btn-credits-back">Voltar</button>
        </div>

        <!-- Tela de Jogo -->
        <div id="screen-game" class="screen" style="border:none; width:100%; max-width: none;">
            <h2>Status</h2>
            <div id="hud">
                <span>HP: <span id="hp">100</span></span>
                <span>O2: <span id="o2">50</span></span>
                <span>📦: <span id="parts">0</span>/5</span>
                <span>💣: <span id="ammo">5</span></span>
            </div>

            <h2>Mapa</h2>
            <div id="game-container"></div>

            <h2>Controles</h2>
            <div id="controls">
                <div id="d-pad">
                    <button id="btn-up" class="move-btn" onclick="move(0, -1)">NORTE (↑)</button>
                    <button id="btn-left" class="move-btn" onclick="move(-1, 0)">OESTE (←)</button>
                    <button id="btn-right" class="move-btn" onclick="move(1, 0)">LESTE (→)</button>
                    <button id="btn-down" class="move-btn" onclick="move(0, 1)">SUL (↓)</button>
                </div>
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <button id="btn-scan" class="action-btn" onclick="scan()">SCAN</button>
                    <button id="btn-fire" class="action-btn" onclick="fire()" style="background:#ff0000; color:#fff;">FIRE</button>
                </div>
            </div>

            <h2>Armas</h2>
            <div id="weapon-selector">
                <button id="w-1" class="weapon-btn active-weapon" onclick="setWeapon(0)">1. MACHETE</button>
                <button id="w-2" class="weapon-btn" onclick="setWeapon(1)">2. TASER</button>
                <button id="w-3" class="weapon-btn" onclick="setWeapon(2)">3. GRANADA</button>
            </div>

            <h2>Log</h2>
            <div id="log" aria-live="polite" aria-atomic="false"></div>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const log = document.getElementById('log');
        const GRID_SIZE = 20;
        
        let lang = 'pt';
        const i18n = {
            pt: {
                start: "Iniciar Jogo",
                lore: "Lore (História)",
                credits: "Créditos",
                back: "Voltar",
                changeLang: "Mudar Idioma",
                howTo: "Como Jogar",
                howToText: "<strong>Objetivo:</strong> Colete 5 peças (P) e volte para a Máquina do Tempo (M) em (0,0).<br><br><strong>Movimento:</strong> Use as setas ou botões de direção. Cada passo consome Oxigênio (O2).<br><br><strong>Combate:</strong><br>1. Machete: Curto alcance, limpa arbustos (#).<br>2. Taser: Causa dano com chance de atordoar.<br>3. Granada: Explode em raio 2, munição limitada.<br><br><strong>Estratégia:</strong> Dinos (V, T) são atraídos por cadáveres (X). Use-os como isca! O SCAN (S) localiza itens próximos.",
                feedback: "Feedback",
                loreText: "Ano 2150. A humanidade esgotou os recursos da Terra. Você é o Dr. Aris, um cientista enviado 65 milhões de anos ao passado para coletar peças de uma tecnologia experimental deixada por uma expedição perdida. Sua Máquina do Tempo quebrou no impacto. Encontre as 5 peças, recupere oxigênio e tome cuidado: você não está sozinho no Cretáceo.",
                creditsText: "<p><strong>Equipe:</strong> Eu Concego Jogar</p><p><strong>Dev:</strong> Anderson Carvalho</p><p><strong>Enredo:</strong> Adri Lima</p><p><strong>Email:</strong> euconcego@gmail.com</p>",
                win: "MISSÃO CUMPRIDA! Você voltou para o futuro!",
                gameOver: "VOCÊ VIROU COMIDA DE DINOSSAURO. FIM DE JOGO.",
                roarRex: "UM RUGIDO ENSURDECEDOR ECOA! O T-Rex despertou faminto!",
                roarVelo: "Você ouve um rugido distante... um Velociraptor entrou na área!",
                partFound: "Aqui: Peça coletada!",
                machineMissing: "Aqui: Máquina do Tempo (faltam peças).",
                o2Found: "Aqui: Oxigênio recuperado!",
                bushBlock: "Arbusto denso bloqueia o caminho! Use o Machete.",
                noAmmo: "Sem granadas.",
                scanned: "Escaneando de",
                nothingNear: "Nada próximo.",
                steps: "passos ao",
                here: "Aqui",
                eating: "está devorando um cadáver! Ele ficará distraído.",
                fighting: "BRIGA! {a} e {b} disputam o cadáver!",
                fightWin: "{winner} venceu a disputa. {loser} foi eliminado!",
                attack: "ALERTA: Ataque de",
                rexRoar: "O T-Rex RUGIU! A manada está em fuga!",
                rexAttackDino: "T-Rex ATACOU {target} em fúria!",
                stampede: "Um dinossauro em pânico passa por você! -{dmg} HP.",
                names: { 'P': 'Peça', '*': 'Ar', '#': 'Arbusto', 'M': 'Máquina', 'T': 'T-Rex', 'V': 'Velociraptor', 'X': 'Cadáver', 'F': 'Dinossauro em fuga' }
            },
            en: {
                start: "Start Game",
                lore: "Lore (Story)",
                credits: "Credits",
                back: "Back",
                changeLang: "Change Language",
                howTo: "How to Play",
                howToText: "<strong>Objective:</strong> Collect 5 parts (P) and return to the Time Machine (M) at (0,0).<br><br><strong>Movement:</strong> Use arrows or direction buttons. Each step consumes Oxygen (O2).<br><br><strong>Combat:</strong><br>1. Machete: Short range, clears bushes (#).<br>2. Taser: Deals damage with stun chance.<br>3. Grenade: Explodes in radius 2, limited ammo.<br><br><strong>Strategy:</strong> Dinos (V, T) are attracted to corpses (X). Use them as bait! SCAN (S) locates nearby items.",
                feedback: "Feedback",
                loreText: "Year 2150. Humanity has depleted Earth's resources. You are Dr. Aris, a scientist sent 65 million years into the past to collect pieces of experimental technology left by a lost expedition. Your Time Machine broke on impact. Find the 5 parts, recover oxygen, and beware: you are not alone in the Cretaceous.",
                creditsText: "<p><strong>Team:</strong> Eu Concego Jogar</p><p><strong>Dev:</strong> Anderson Carvalho</p><p><strong>Plot:</strong> Adri Lima</p><p><strong>Email:</strong> euconcego@gmail.com</p>",
                win: "MISSION ACCOMPLISHED! You returned to the future!",
                gameOver: "YOU BECAME DINOSAUR FOOD. GAME OVER.",
                roarRex: "A DEAFENING ROAR ECHOES! The T-Rex woke up hungry!",
                roarVelo: "You hear a distant roar... a Velociraptor has entered the area!",
                partFound: "Here: Part collected!",
                machineMissing: "Here: Time Machine (parts missing).",
                o2Found: "Here: Oxygen recovered!",
                bushBlock: "Dense bush blocks the way! Use Machete.",
                noAmmo: "No grenades left.",
                scanned: "Scanning from",
                nothingNear: "Nothing nearby.",
                steps: "steps to the",
                here: "Here",
                eating: "is devouring a corpse! He will be distracted.",
                fighting: "FIGHT! {a} and {b} are fighting over the corpse!",
                fightWin: "{winner} won the fight. {loser} was eliminated!",
                attack: "ALERT: Attack from",
                rexRoar: "The T-Rex ROARED! The herd is fleeing!",
                rexAttackDino: "T-Rex ATTACKED {target} in a frenzy!",
                stampede: "A panicked dinosaur runs past you! -{dmg} HP.",
                names: { 'P': 'Part', '*': 'Air', '#': 'Bush', 'M': 'Machine', 'T': 'T-Rex', 'V': 'Velociraptor', 'X': 'Corpse', 'F': 'Fleeing Dinosaur' }
            }
        };

        let player = { x: 1, y: 1, hp: 100, o2: 80, parts: 0, weaponIdx: 0, ammo: 5 };
        const weapons = ['Machete', 'Taser', 'Granada'];
        let map = [];
        let dinos = [];
        let corpses = [];
        let rexRoarTimer = 0; // turnos até o próximo rugido do T-Rex
        let audioCtx = null;
        let ambientNodes = null; // nós do som ambiente
        let breathingTimeout = null; // handle do loop de respiração ofegante

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function setLang(l) {
            lang = l;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const t = i18n[lang];
            document.getElementById('btn-start').textContent = t.start;
            document.getElementById('btn-how-to').textContent = t.howTo;
            document.getElementById('how-to-title').textContent = t.howTo;
            document.getElementById('how-to-content').innerHTML = `<p>${t.howToText}</p>`;
            document.getElementById('btn-how-to-back').textContent = t.back;
            document.getElementById('btn-lore').textContent = t.lore;
            document.getElementById('btn-credits').textContent = t.credits;
            document.getElementById('btn-back-lang').textContent = t.changeLang;
            document.getElementById('lore-title').textContent = t.lore;
            document.getElementById('lore-content').innerHTML = `<p>${t.loreText}</p>`;
            document.getElementById('btn-lore-back').textContent = t.back;
            document.getElementById('credits-title').textContent = t.credits;
            document.getElementById('credits-content').innerHTML = t.creditsText;
            document.getElementById('btn-credits-back').textContent = t.back;

            // Tradução dos controles de acessibilidade
            document.getElementById('btn-up').textContent = lang === 'pt' ? 'NORTE (↑)' : 'NORTH (↑)';
            document.getElementById('btn-down').textContent = lang === 'pt' ? 'SUL (↓)' : 'SOUTH (↓)';
            document.getElementById('btn-left').textContent = lang === 'pt' ? 'OESTE (←)' : 'WEST (←)';
            document.getElementById('btn-right').textContent = lang === 'pt' ? 'LESTE (→)' : 'EAST (→)';
            
            showScreen('screen-menu');
        }

        function startGame() {
            player = { x: 1, y: 1, hp: 100, o2: 80, parts: 0, weaponIdx: 0, ammo: 5 };
            initMap();
            showScreen('screen-game');
            startAmbient();
        }

        function startAmbient() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (ambientNodes) return; // já tocando

            // Vento suave — ruído branco filtrado
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            const wind = audioCtx.createBufferSource();
            wind.buffer = buffer;
            wind.loop = true;

            const windFilter = audioCtx.createBiquadFilter();
            windFilter.type = 'bandpass';
            windFilter.frequency.value = 400;
            windFilter.Q.value = 0.3;

            const windGain = audioCtx.createGain();
            windGain.gain.value = 0.04;

            wind.connect(windFilter);
            windFilter.connect(windGain);
            windGain.connect(audioCtx.destination);
            wind.start();

            // Eco de vale — oscilador grave pulsante
            const echo = audioCtx.createOscillator();
            echo.type = 'sine';
            echo.frequency.value = 55;

            const echoGain = audioCtx.createGain();
            echoGain.gain.value = 0.0;

            // Pulsa suavemente a cada ~4s simulando ressonância do vale
            const lfo = audioCtx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = 0.25;
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 0.02;
            lfo.connect(lfoGain);
            lfoGain.connect(echoGain.gain);

            echo.connect(echoGain);
            echoGain.connect(audioCtx.destination);
            echo.start();
            lfo.start();

            ambientNodes = { wind, echo, lfo };
        }

        function stopAmbient() {
            if (!ambientNodes) return;
            try { ambientNodes.wind.stop(); } catch(e) {}
            try { ambientNodes.echo.stop(); } catch(e) {}
            try { ambientNodes.lfo.stop(); } catch(e) {}
            ambientNodes = null;
            stopBreathing();
        }


        function playSound(freq, type = 'sine', volume = 0.3, duration = 0.2, pan = 0) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const panner = audioCtx.createStereoPanner();

            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            panner.pan.setValueAtTime(pan, audioCtx.currentTime);

            osc.connect(gain);
            gain.connect(panner);
            panner.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- Feedback sonoro de O2 baixo ---

        function stopBreathing() {
            if(breathingTimeout) { clearTimeout(breathingTimeout); breathingTimeout = null; }
        }

        function playBreathPulse() {
            // Uma inalação curta (sine subindo) + exalação (sine descendo)
            if(!audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(220, t);
            osc.frequency.linearRampToValueAtTime(180, t + 0.25);
            osc.frequency.linearRampToValueAtTime(150, t + 0.55);
            gain.gain.setValueAtTime(0.0, t);
            gain.gain.linearRampToValueAtTime(0.18, t + 0.1);
            gain.gain.linearRampToValueAtTime(0.12, t + 0.3);
            gain.gain.linearRampToValueAtTime(0.0, t + 0.55);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + 0.6);
        }

        function scheduleBreathing() {
            stopBreathing();
            if(player.o2 > 10) return;
            playBreathPulse();
            // Intervalo diminui com o O2: de 2s (o2=10) até 0.9s (o2=1)
            const interval = Math.max(900, 200 * player.o2);
            breathingTimeout = setTimeout(() => {
                if(player.o2 > 0 && player.hp > 0) scheduleBreathing();
            }, interval);
        }

        // Distorção do sonar quando O2 ≤ 20: toca um chirp breve e instável
        function playO2Warning() {
            if(!audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            // Frequência oscila irregularmente — simula o sonar falhando
            osc.frequency.setValueAtTime(880, t);
            osc.frequency.linearRampToValueAtTime(620 + Math.random() * 200, t + 0.12);
            osc.frequency.linearRampToValueAtTime(880, t + 0.22);
            gain.gain.setValueAtTime(0.12, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + 0.25);
        }

        function initMap() {
            map = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill('.'));
            dinos = [];
            corpses = [];
            map[0][0] = 'M';
            for(let i=0; i<5; i++) {
                let rx, ry;
                do { rx = Math.floor(Math.random()*18)+1; ry = Math.floor(Math.random()*18)+1; } while(map[ry][rx] !== '.');
                map[ry][rx] = 'P';
            }
            for(let i=0; i<3; i++) {
                let rx, ry;
                do { rx = Math.floor(Math.random()*18)+1; ry = Math.floor(Math.random()*18)+1; } while(map[ry][rx] !== '.');
                map[ry][rx] = '*';
            }
            for(let i=0; i<15; i++) {
                let rx, ry;
                do { rx = Math.floor(Math.random()*18)+1; ry = Math.floor(Math.random()*18)+1; } while(map[ry][rx] !== '.');
                map[ry][rx] = '#';
            }
            for(let i=0; i<5; i++) {
                let rx = Math.floor(Math.random()*15)+4;
                let ry = Math.floor(Math.random()*15)+4;
                if(map[ry][rx] === '.') {
                    dinos.push({x: rx, y: ry, type: 'V', hp: 30, eatingTurns: 0});
                }
            }
            log.innerHTML = '';
            draw();
        }

        function spawnTRex() {
            addToLog(i18n[lang].roarRex);
            playSound(60, 'sawtooth', 1.5, 0.5);
            let corners = [[18, 18], [18, 0], [0, 18]];
            let pick = corners[Math.floor(Math.random() * corners.length)];
            dinos.push({x: pick[0], y: pick[1], type: 'T', hp: 120, eatingTurns: 0});
            rexRoarTimer = 8 + Math.floor(Math.random() * 5); // primeiro rugido em 8~12 turnos
            draw();
        }

        function triggerRexRoar() {
            addToLog(i18n[lang].rexRoar);
            // Rugido grave longo
            playSound(45, 'sawtooth', 1.2, 0.8);
            setTimeout(() => playSound(38, 'sawtooth', 0.8, 0.6), 300);

            // Spawna 2~3 dinos em fuga em bordas aleatórias
            const count = 2 + Math.floor(Math.random() * 2);
            for(let i = 0; i < count; i++) {
                // Escolhe uma borda de entrada
                const side = Math.floor(Math.random() * 4);
                let sx, sy, dirX, dirY;
                if(side === 0)      { sx = Math.floor(Math.random() * GRID_SIZE); sy = 0;  dirX = 0;  dirY = 1; }  // norte → sul
                else if(side === 1) { sx = Math.floor(Math.random() * GRID_SIZE); sy = GRID_SIZE-1; dirX = 0; dirY = -1; } // sul → norte
                else if(side === 2) { sx = 0; sy = Math.floor(Math.random() * GRID_SIZE); dirX = 1;  dirY = 0; }  // oeste → leste
                else                { sx = GRID_SIZE-1; sy = Math.floor(Math.random() * GRID_SIZE); dirX = -1; dirY = 0; } // leste → oeste
                dinos.push({ x: sx, y: sy, type: 'F', hp: 20, eatingTurns: 0, dirX, dirY });
            }

            // T-Rex ataca dinos adjacentes (raiva — ataca tudo)
            const rex = dinos.find(d => d.type === 'T');
            if(rex) {
                const adjacent = dinos.filter(d => d !== rex && Math.abs(d.x - rex.x) + Math.abs(d.y - rex.y) <= 1);
                adjacent.forEach(target => {
                    const dmg = 40;
                    target.hp -= dmg;
                    addToLog(i18n[lang].rexAttackDino.replace('{target}', i18n[lang].names[target.type]));
                    playSound(90, 'sawtooth', 0.5, 0.3);
                    if(target.hp <= 0) {
                        corpses.push({ x: target.x, y: target.y });
                        dinos.splice(dinos.indexOf(target), 1);
                    }
                });
            }

            rexRoarTimer = 8 + Math.floor(Math.random() * 6); // próximo rugido em 8~13 turnos
        }

        function spawnNewDino() {
            let rx = Math.floor(Math.random() * GRID_SIZE);
            let ry = Math.floor(Math.random() * GRID_SIZE);
            const hasTRex = dinos.some(d => d.type === 'T');
            const canSpawnTRex = player.parts >= 5 && !hasTRex;
            
            if(Math.abs(rx - player.x) + Math.abs(ry - player.y) > 10 && map[ry][rx] === '.' && (rx !== player.x || ry !== player.y) && (rx !== 0 || ry !== 0)) {
                if(!dinos.some(d => d.x === rx && d.y === ry) && !corpses.some(c => c.x === rx && c.y === ry)) {
                    // Impede spawn de dinos fantasmas em cima de cadáveres
                    let type = (canSpawnTRex && Math.random() > 0.8) ? 'T' : 'V';
                    if (type === 'T' && (!canSpawnTRex)) type = 'V';
                    dinos.push({x: rx, y: ry, type: type, hp: type === 'T' ? 100 : 30, eatingTurns: 0});
                    addToLog(type === 'T' ? i18n[lang].roarRex : i18n[lang].roarVelo);
                    playSound(type === 'T' ? 55 : 220, 'sawtooth', 0.4, 0.6);
                }
            }
        }

        function draw() {
            container.innerHTML = '';
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (x === player.x && y === player.y) {
                        cell.textContent = '@';
                        cell.classList.add('player');
                    } else {
                        const dino = dinos.find(d => d.x === x && d.y === y);
                        const corpse = corpses.find(c => c.x === x && c.y === y);
                        if (dino) cell.textContent = dino.type;
                        else if (corpse) cell.textContent = 'X';
                        else {
                            cell.textContent = map[y][x];
                            if (map[y][x] === 'P') cell.classList.add('part');
                            if (map[y][x] === '*') cell.classList.add('air');
                            if (map[y][x] === 'M') cell.style.color = '#ff00ff'; 
                        }
                    }
                    container.appendChild(cell);
                }
            }
            document.getElementById('hp').textContent = player.hp;
            document.getElementById('o2').textContent = player.o2;
            document.getElementById('parts').textContent = player.parts;
            document.getElementById('ammo').textContent = player.ammo;
        }

        function move(dx, dy) {
            const nx = player.x + dx; const ny = player.y + dy;
            if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
                if(map[ny][nx] === '#') {
                    addToLog(i18n[lang].bushBlock);
                    playSound(150, 'square', 0.2);
                    return;
                }
                player.x = nx; player.y = ny;
                player.o2--;
                let logMsg = `${player.x}, ${player.y}.`;
                if(player.o2 <= 0) { player.hp -= 5; player.o2 = 0; logMsg += " O2!"; playSound(100, 'sawtooth'); }
                // Feedback sonoro progressivo de O2 baixo
                if(player.o2 <= 20 && player.o2 > 10) playO2Warning();
                if(player.o2 <= 10 && player.o2 > 0) scheduleBreathing();
                if(map[player.y][player.x] === 'P') { 
                    player.parts++; map[player.y][player.x] = '.'; logMsg += " " + i18n[lang].partFound; 
                    playSound(1200, 'sine', 0.4); if(player.parts === 5) spawnTRex();
                }
                if(map[player.y][player.x] === 'M') { 
                    if(player.parts >= 5) {
                        addToLog(i18n[lang].win); playSound(1500, 'triangle', 1.0, 0.4);
                        stopAmbient(); setTimeout(() => showScreen('screen-menu'), 4000); return;
                    } else { logMsg += " " + i18n[lang].machineMissing; playSound(523.25, 'sine', 0.5, 0.3); }
                }
                if(map[player.y][player.x] === '*') { 
                    player.o2 += 30; map[player.y][player.x] = '.'; logMsg += " " + i18n[lang].o2Found; 
                    playSound(600, 'triangle', 0.5); 
                }
                addToLog(logMsg);
                playEnvironmentSonar();
                moveDinos();
                let spawnChance = 0.03 + (player.parts * 0.02);
                if(Math.random() < spawnChance) spawnNewDino(); 
                draw();
            }
        }

        function moveDinos() {
            const px = player.x; const py = player.y;

            // Tick do rugido do T-Rex
            if(dinos.some(d => d.type === 'T')) {
                rexRoarTimer--;
                if(rexRoarTimer <= 0) triggerRexRoar();
            }

            // Remove dinos em fuga que saíram do mapa
            for(let i = dinos.length - 1; i >= 0; i--) {
                const d = dinos[i];
                if(d.type === 'F' && (d.x < 0 || d.x >= GRID_SIZE || d.y < 0 || d.y >= GRID_SIZE)) {
                    dinos.splice(i, 1);
                }
            }

            dinos.forEach(d => {
                if(d.stunned > 0) { d.stunned--; return; }

                // Dino em fuga: corre em linha reta, ataca player apenas se passar pela célula
                if(d.type === 'F') {
                    d.x += d.dirX; d.y += d.dirY;
                    if(d.x === px && d.y === py) {
                        const dmg = 8;
                        player.hp -= dmg;
                        addToLog(i18n[lang].stampede.replace('{dmg}', dmg));
                        playSound(200, 'sawtooth', 0.5, 0.3);
                    }
                    return;
                }

                if(d.eatingTurns > 0) {
                    d.eatingTurns--;
                    if(d.eatingTurns === 0) {
                        const eaten = corpses.findIndex(c => c.x === d.x && c.y === d.y);
                        if(eaten !== -1) corpses.splice(eaten, 1);
                    }
                    return;
                }

                // T-Rex ataca dinos adjacentes (V ou F) antes de perseguir player
                if(d.type === 'T') {
                    const prey = dinos.find(other => other !== d && Math.abs(other.x - d.x) + Math.abs(other.y - d.y) <= 1);
                    if(prey) {
                        const dmg = 40; prey.hp -= dmg;
                        addToLog(i18n[lang].rexAttackDino.replace('{target}', i18n[lang].names[prey.type]));
                        playSound(90, 'sawtooth', 0.5, 0.3);
                        if(prey.hp <= 0) { corpses.push({ x: prey.x, y: prey.y }); dinos.splice(dinos.indexOf(prey), 1); }
                        return;
                    }
                }

                let corpseIdx = corpses.findIndex(c => Math.abs(c.x - d.x) <= 1 && Math.abs(c.y - d.y) <= 1);
                if(corpseIdx !== -1) {
                    d.eatingTurns = d.type === 'T' ? 3 : 5; const corpse = corpses[corpseIdx]; d.x = corpse.x; d.y = corpse.y;
                    addToLog(`${i18n[lang].names[d.type]} ${i18n[lang].eating}`);
                    playSound(100, 'square', 0.8, 0.3); return;
                }
                let dx = px - d.x; let dy = py - d.y; let dist = Math.abs(dx) + Math.abs(dy);
                let chaseDist = d.type === 'T' ? 25 : 10;
                if(dist <= chaseDist && dist > 0) {
                    const distBefore = dist;
                    let moves = d.type === 'T' ? 2 : 1;
                    for(let m=0; m < moves; m++) {
                        let curDx = px - d.x; let curDy = py - d.y;
                        if(Math.abs(curDx) > Math.abs(curDy)) d.x += curDx > 0 ? 1 : -1; else d.y += curDy > 0 ? 1 : -1;
                        if(d.x === px && d.y === py) {
                            let dmg = d.type === 'T' ? 25 : 8; player.hp -= dmg;
                            addToLog(`${i18n[lang].attack} ${i18n[lang].names[d.type]}! -${dmg} HP.`);
                            playSound(80, 'sawtooth', 0.5, 0.4); break;
                        }
                    }
                    // Alerta sonoro: toca quando o dino avança na direção do player
                    const distAfter = Math.abs(px - d.x) + Math.abs(py - d.y);
                    if(distAfter < distBefore && distAfter > 0) {
                        const pan = Math.max(-1, Math.min(1, (d.x - px) / 5));
                        if(d.type === 'T') {
                            // T-Rex: pulso grave audível a qualquer distância
                            playSound(55, 'sawtooth', Math.max(0.08, 0.35 - distAfter * 0.01), 0.08, pan);
                        } else if(distAfter <= 5) {
                            // Velo: clique seco só quando perto (≤5) pra não saturar
                            playSound(180, 'square', Math.max(0.05, 0.22 - distAfter * 0.03), 0.06, pan);
                        }
                    }
                } else {
                    let r = Math.random();
                    if(r < 0.25) d.x++; else if(r < 0.5) d.x--; else if(r < 0.75) d.y++; else d.y--;
                }
                d.x = Math.max(0, Math.min(GRID_SIZE-1, d.x)); d.y = Math.max(0, Math.min(GRID_SIZE-1, d.y));
            });
            if(player.hp <= 0) {
                addToLog(i18n[lang].gameOver); playSound(50, 'sawtooth', 2.0, 0.5);
                stopAmbient(); setTimeout(() => showScreen('screen-menu'), 3000);
            }

            // Briga por cadáver: 2 dinos comendo na mesma célula se atacam
            const eating = dinos.filter(d => d.eatingTurns > 0);
            for(let i = 0; i < eating.length; i++) {
                for(let j = i + 1; j < eating.length; j++) {
                    const a = eating[i]; const b = eating[j];
                    if(a.x === b.x && a.y === b.y) {
                        const nameA = i18n[lang].names[a.type]; const nameB = i18n[lang].names[b.type];
                        addToLog(i18n[lang].fighting.replace('{a}', nameA).replace('{b}', nameB));
                        playSound(160, 'sawtooth', 0.6, 0.5);
                        // T-Rex sempre vence; entre iguais é 50/50
                        let winner, loser;
                        if(a.type === 'T' && b.type !== 'T') { winner = a; loser = b; }
                        else if(b.type === 'T' && a.type !== 'T') { winner = b; loser = a; }
                        else { winner = Math.random() < 0.5 ? a : b; loser = winner === a ? b : a; }
                        const nameW = i18n[lang].names[winner.type]; const nameL = i18n[lang].names[loser.type];
                        addToLog(i18n[lang].fightWin.replace('{winner}', nameW).replace('{loser}', nameL));
                        playSound(60, 'sawtooth', 0.8, 0.4);
                        dinos.splice(dinos.indexOf(loser), 1);
                        // Vencedor volta a comer — cadáver já está sendo consumido
                        winner.eatingTurns = winner.type === 'T' ? 3 : 5;
                    }
                }
            }
        }

        function scan() {
            moveDinos();
            let found = [];
            addToLog(`${i18n[lang].scanned} ${player.x}, ${player.y}...`);
            for(let y=0; y<GRID_SIZE; y++) {
                for(let x=0; x<GRID_SIZE; x++) {
                    let cell = map[y][x];
                    const dino = dinos.find(d => d.x === x && d.y === y);
                    const corpse = corpses.find(c => c.x === x && c.y === y);
                    if (dino) cell = dino.type; else if (corpse) cell = 'X';
                    if(cell !== '.') {
                        let dx = x - player.x; let dy = y - player.y; let dist = Math.abs(dx) + Math.abs(dy);
                        if(dist >= 0 && dist < 6) {
                            let dirY = dy > 0 ? (lang === 'pt' ? "S" : "S") : dy < 0 ? (lang === 'pt' ? "N" : "N") : "";
                            let dirX = dx > 0 ? (lang === 'pt' ? "L" : "E") : dx < 0 ? (lang === 'pt' ? "O" : "W") : "";
                            
                            let loc;
                            if (dist === 0) {
                                loc = i18n[lang].here;
                            } else {
                                let parts = [];
                                if (dy !== 0) parts.push(`${Math.abs(dy)}${dirY}`);
                                if (dx !== 0) parts.push(`${Math.abs(dx)}${dirX}`);
                                loc = parts.join(", ");
                            }
                            
                            const names = i18n[lang].names;
                            found.push(`${names[cell] || cell}: ${loc}`);
                        }
                    }
                }
            }
            if (found.length) {
                found.forEach(msg => addToLog(msg));
            } else {
                addToLog(i18n[lang].nothingNear);
            }
            playSound(600, 'sine'); draw();
        }

        function setWeapon(idx) {
            moveDinos();
            player.weaponIdx = idx;
            document.querySelectorAll('.weapon-btn').forEach((b, i) => {
                b.classList.toggle('active-weapon', i === idx);
            });
            playSound(400, 'sine', 0.2);
        }

        function fire() {
            const directions = [{x:0, y:-1}, {x:0, y:1}, {x:-1, y:0}, {x:1, y:0}];
            // Sempre checa se há algo na mesma posição do jogador
            checkHit(player.x, player.y, weapons[player.weaponIdx] === 'Granada' ? 25 : (weapons[player.weaponIdx] === 'Taser' ? 15 : 10));

            if(weapons[player.weaponIdx] === 'Machete') {
                directions.forEach(dir => {
                    const nx = player.x + dir.x; const ny = player.y + dir.y;
                    if(nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
                        const cell = map[ny][nx];
                        const corpseIdx = corpses.findIndex(c => c.x === nx && c.y === ny);
                        if (corpseIdx !== -1) {
                            corpses.splice(corpseIdx, 1);
                            addToLog(lang === 'pt' ? "Cadáver removido!" : "Corpse cleared!");
                            playSound(150, 'square', 0.4, 0.4);
                        }
                        if(cell === '#') {
                            map[ny][nx] = '.';
                            addToLog(lang === 'pt' ? "Arbusto removido!" : "Bush cleared!");
                            playSwordSlash();
                        }
                        checkHit(nx, ny, 10);
                    }
                });
                playSwordSlash();
            } else if(weapons[player.weaponIdx] === 'Taser') {
                directions.forEach(dir => {
                    const nx = player.x + dir.x; const ny = player.y + dir.y;
                    if(nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) checkHit(nx, ny, 15);
                });
                playTaserZap();
            } else if(weapons[player.weaponIdx] === 'Granada') {
                if(player.ammo > 0) {
                    player.ammo--;
                    // Explode em todas as células ao redor (raio 2)
                    for(let dy = -2; dy <= 2; dy++) {
                        for(let dx = -2; dx <= 2; dx++) {
                            checkHit(player.x + dx, player.y + dy, 25);
                        }
                    }
                    playSound(150, 'sawtooth', 0.8, 0.6);
                    playSound(80, 'sawtooth', 0.5, 0.8);
                } else {
                    addToLog(i18n[lang].noAmmo);
                    return;
                }
            }
            moveDinos();
            draw();
        }

        function checkHit(x, y, dmg) {
            let hit = false;
            for(let i = dinos.length - 1; i >= 0; i--) {
                const d = dinos[i];
                if(d.x === x && d.y === y) {
                    d.hp -= dmg;
                    const dName = i18n[lang].names[d.type];
                    if(weapons[player.weaponIdx] === 'Taser') {
                        d.stunned = 3;
                        playSound(1200, 'sine', 0.2, 0.5);
                        addToLog(`Stun: ${dName}!`);
                    }
                    if(d.hp <= 0) {
                        addToLog(`Kill: ${dName}!`); corpses.push({x: d.x, y: d.y}); dinos.splice(i, 1);
                    } else {
                        addToLog(`Hit: ${dName}! (HP: ${d.hp})`);
                        if(!(weapons[player.weaponIdx] === 'Taser')) {
                            let rdx = player.x - d.x; let rdy = player.y - d.y;
                            if(Math.abs(rdx) > Math.abs(rdy)) d.x += rdx > 0 ? 1 : -1; else d.y += rdy > 0 ? 1 : -1;
                        }
                        playSound(120, 'sawtooth', 0.2, 0.3);
                    }
                    hit = true;
                }
            }
            return hit;
        }

        function playSwordSlash() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Impacto seco: ruído branco filtrado com envelope agressivo
            const bufSize = audioCtx.sampleRate * 0.18;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for(let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

            const src = audioCtx.createBufferSource();
            src.buffer = buf;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 1800;
            filter.Q.value = 1.5;

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.7, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);

            src.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            src.start();
            src.stop(audioCtx.currentTime + 0.18);
        }

        function playTaserZap() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Sweep elétrico: frequência desce rapidamente com harmônico
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            osc.type = 'square';
            osc.frequency.setValueAtTime(2400, t);
            osc.frequency.exponentialRampToValueAtTime(180, t + 0.18);

            const osc2 = audioCtx.createOscillator();
            osc2.type = 'sawtooth';
            osc2.frequency.setValueAtTime(3600, t);
            osc2.frequency.exponentialRampToValueAtTime(260, t + 0.15);

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.25, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.22);

            const gain2 = audioCtx.createGain();
            gain2.gain.setValueAtTime(0.15, t);
            gain2.gain.exponentialRampToValueAtTime(0.01, t + 0.18);

            osc.connect(gain);   gain.connect(audioCtx.destination);
            osc2.connect(gain2); gain2.connect(audioCtx.destination);

            osc.start(t);  osc.stop(t + 0.22);
            osc2.start(t); osc2.stop(t + 0.22);
        }

        function playEnvironmentSonar() {
            // Som de passo
            playSound(80, 'sine', 0.12, 0.08);

            const sonarItems = [];

            // Varre raio 3 ao redor do jogador
            for (let dy = -3; dy <= 3; dy++) {
                for (let dx = -3; dx <= 3; dx++) {
                    if (dx === 0 && dy === 0) continue;
                    const nx = player.x + dx; const ny = player.y + dy;
                    if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) continue;
                    const dist = Math.abs(dx) + Math.abs(dy);
                    let cell = map[ny][nx];
                    const dino = dinos.find(d => d.x === nx && d.y === ny);
                    const corpse = corpses.find(c => c.x === nx && c.y === ny);
                    if (dino) cell = dino.type; else if (corpse) cell = 'X';

                    let freq = 0; let type = 'sine'; let maxDist = 1;
                    if (cell === 'P')         { freq = 880;    type = 'triangle'; maxDist = 1; }
                    else if (cell === '*')    { freq = 600;    type = 'triangle'; maxDist = 1; }
                    else if (cell === '#')    { freq = 150;    type = 'square';   maxDist = 1; }
                    else if (cell === 'M')    { freq = 523.25; type = 'sine';     maxDist = 2; }
                    else if (cell === 'X')    { freq = 200;    type = 'square';   maxDist = 2; }
                    else if (cell === 'V')    { freq = 180;    type = 'sawtooth'; maxDist = 3; }
                    else if (cell === 'T')    { freq = 80;     type = 'sawtooth'; maxDist = 3; }

                    if (freq > 0 && dist <= maxDist) {
                        const vol = 0.25 - (dist - 1) * 0.07;
                        const pan = dx / 3;
                        sonarItems.push({ freq, type, vol: Math.max(vol, 0.04), pan });
                    }
                }
            }

            // Toca cada item com delay para não sobrepor tudo
            sonarItems.forEach((item, i) => {
                setTimeout(() => playSound(item.freq, item.type, item.vol, 0.15, item.pan), i * 120);
            });
        }

        function addToLog(msg) {
            const entry = document.createElement('div');
            entry.textContent = `> ${msg}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
            if (log.childNodes.length > 50) log.removeChild(log.firstChild);
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('screen-game').classList.contains('active-screen')) {
                if (e.key === 'ArrowUp') move(0, -1);
                if (e.key === 'ArrowDown') move(0, 1);
                if (e.key === 'ArrowLeft') move(-1, 0);
                if (e.key === 'ArrowRight') move(1, 0);
                if (e.key === 's') scan();
                if (e.key === 'f') fire();
                if (['1','2','3'].includes(e.key)) setWeapon(parseInt(e.key)-1);
            }
        });
    </script>
</body>
